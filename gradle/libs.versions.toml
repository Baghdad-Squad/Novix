junit = "4.13.2"
junitJupiter = "5.8.2"
junitVersion = "1.2.1"
koin = "3.5.6"
kotlin = "2.1.0"
kotlinxCoroutines = "1.10.2"
kotlinxDatetime = "0.7.0"
ksp = "2.0.21-1.0.27"
ktor = "2.3.10"
